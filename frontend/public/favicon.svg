<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1b26" stroke="#7aa2f7" stroke-width="2.5"/>
  <!-- Root node -->
  <circle cx="32" cy="14" r="5" fill="#7aa2f7"/>
  <!-- Edges from root to children -->
  <line x1="32" y1="19" x2="18" y2="33" stroke="#565f89" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="19" x2="46" y2="33" stroke="#565f89" stroke-width="2" stroke-linecap="round"/>
  <!-- Left child -->
  <circle cx="18" cy="36" r="4.5" fill="#9ece6a"/>
  <!-- Right child -->
  <circle cx="46" cy="36" r="4.5" fill="#bb9af7"/>
  <!-- Edges from left child to grandchildren -->
  <line x1="18" y1="40.5" x2="11" y2="49" stroke="#565f89" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="40.5" x2="25" y2="49" stroke="#565f89" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Grandchildren -->
  <circle cx="11" cy="52" r="3.5" fill="#7dcfff"/>
  <circle cx="25" cy="52" r="3.5" fill="#e0af68"/>
  <circle cx="46" cy="52" r="3.5" fill="#f7768e"/>
  <!-- Edge from right child to grandchild -->
  <line x1="46" y1="40.5" x2="46" y2="49" stroke="#565f89" stroke-width="1.5" stroke-linecap="round"/>
</svg>
